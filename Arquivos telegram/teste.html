<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 5px;
        }

        .content {
            padding: 30px;
        }

        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }

        .form-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add {
            background: #667eea;
            color: white;
            flex: 1;
        }

        .btn-add:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-limpar {
            background: #ddd;
            color: #333;
            flex: 1;
        }

        .btn-limpar:hover {
            background: #ccc;
        }

        .table-section {
            margin-top: 30px;
        }

        .table-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        thead {
            background: #667eea;
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        tbody tr:hover {
            background: #f5f5f5;
        }

        .status-baixo {
            color: #dc3545;
            font-weight: 600;
        }

        .status-normal {
            color: #28a745;
            font-weight: 600;
        }

        .status-medio {
            color: #ffc107;
            font-weight: 600;
        }

        .btn-edit, .btn-delete {
            padding: 6px 12px;
            margin: 0 3px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s;
        }

        .btn-edit {
            background: #17a2b8;
            color: white;
        }

        .btn-edit:hover {
            background: #138496;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .stat-card h3 {
            color: #555;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2em;
            color: #667eea;
            font-weight: bold;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.1em;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-content h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-confirmar {
            background: #667eea;
            color: white;
            flex: 1;
        }

        .btn-cancelar {
            background: #ddd;
            color: #333;
            flex: 1;
        }

        @media (max-width: 768px) {
            .form-group {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 8px 10px;
            }

            header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Controle de Estoque</h1>
            <p>Gerencie seu estoque de forma eficiente</p>
        </header>

        <div class="content">
            <!-- Estatísticas -->
            <div class="stats">
                <div class="stat-card">
                    <h3>Total de Produtos</h3>
                    <div class="value" id="totalProdutos">0</div>
                </div>
                <div class="stat-card">
                    <h3>Quantidade Total</h3>
                    <div class="value" id="quantidadeTotal">0</div>
                </div>
                <div class="stat-card">
                    <h3>Valor Total</h3>
                    <div class="value" id="valorTotal">R$ 0,00</div>
                </div>
                <div class="stat-card">
                    <h3>Produtos em Alerta</h3>
                    <div class="value" id="produtosAlerta">0</div>
                </div>
            </div>

            <!-- Formulário de Adição -->
            <div class="form-section">
                <h2>Adicionar Novo Produto</h2>
                <div class="form-group">
                    <div>
                        <label for="nomeProduto">Nome do Produto *</label>
                        <input type="text" id="nomeProduto" placeholder="Ex: Notebook">
                    </div>
                    <div>
                        <label for="codigoProduto">Código SKU *</label>
                        <input type="text" id="codigoProduto" placeholder="Ex: SKU123">
                    </div>
                    <div>
                        <label for="categoria">Categoria *</label>
                        <select id="categoria">
                            <option value="">Selecione uma categoria</option>
                            <option value="Eletrônicos">Eletrônicos</option>
                            <option value="Roupas">Roupas</option>
                            <option value="Alimentos">Alimentos</option>
                            <option value="Livros">Livros</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    <div>
                        <label for="quantidade">Quantidade *</label>
                        <input type="number" id="quantidade" placeholder="0" min="0">
                    </div>
                    <div>
                        <label for="preco">Preço Unitário (R$) *</label>
                        <input type="number" id="preco" placeholder="0,00" min="0" step="0.01">
                    </div>
                    <div>
                        <label for="estoqueMinimo">Estoque Mínimo *</label>
                        <input type="number" id="estoqueMinimo" placeholder="0" min="0">
                    </div>
                </div>
                <div class="button-group">
                    <button class="btn-add" onclick="adicionarProduto()">➕ Adicionar Produto</button>
                    <button class="btn-limpar" onclick="limparFormulario()">🗑️ Limpar</button>
                </div>
            </div>

            <!-- Tabela de Produtos -->
            <div class="table-section">
                <h2>Produtos em Estoque</h2>
                <div id="tabelaContainer">
                    <div class="empty-message">Nenhum produto adicionado ainda. Adicione um produto para começar! 📥</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Edição -->
    <div class="modal" id="modalEdicao">
        <div class="modal-content">
            <h2>Editar Produto</h2>
            <div class="form-group">
                <div>
                    <label for="editNome">Nome do Produto</label>
                    <input type="text" id="editNome">
                </div>
                <div>
                    <label for="editQuantidade">Quantidade</label>
                    <input type="number" id="editQuantidade" min="0">
                </div>
                <div>
                    <label for="editPreco">Preço Unitário (R$)</label>
                    <input type="number" id="editPreco" min="0" step="0.01">
                </div>
                <div>
                    <label for="editMinimo">Estoque Mínimo</label>
                    <input type="number" id="editMinimo" min="0">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-confirmar" onclick="salvarEdicao()">Salvar</button>
                <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let produtos = JSON.parse(localStorage.getItem('estoque')) || [];
        let produtoEmEdicao = null;

        // Adicionar Produto
        function adicionarProduto() {
            const nome = document.getElementById('nomeProduto').value.trim();
            const codigo = document.getElementById('codigoProduto').value.trim();
            const categoria = document.getElementById('categoria').value;
            const quantidade = parseInt(document.getElementById('quantidade').value) || 0;
            const preco = parseFloat(document.getElementById('preco').value) || 0;
            const estoqueMinimo = parseInt(document.getElementById('estoqueMinimo').value) || 0;

            if (!nome || !codigo || !categoria || quantidade < 0 || preco < 0) {
                alert('⚠️ Por favor, preencha todos os campos corretamente!');
                return;
            }

            // Verificar se código já existe
            if (produtos.some(p => p.codigo === codigo)) {
                alert('⚠️ Já existe um produto com este código SKU!');
                return;
            }

            const novoProduto = {
                id: Date.now(),
                nome,
                codigo,
                categoria,
                quantidade,
                preco,
                estoqueMinimo,
                dataCadastro: new Date().toLocaleDateString('pt-BR')
            };

            produtos.push(novoProduto);
            salvarDados();
            limparFormulario();
            atualizarTabela();
            alert('✅ Produto adicionado com sucesso!');
        }

        // Limpar Formulário
        function limparFormulario() {
            document.getElementById('nomeProduto').value = '';
            document.getElementById('codigoProduto').value = '';
            document.getElementById('categoria').value = '';
            document.getElementById('quantidade').value = '';
            document.getElementById('preco').value = '';
            document.getElementById('estoqueMinimo').value = '';
        }

        // Atualizar Tabela
        function atualizarTabela() {
            const container = document.getElementById('tabelaContainer');

            if (produtos.length === 0) {
                container.innerHTML = '<div class="empty-message">Nenhum produto adicionado ainda. Adicione um produto para começar! 📥</div>';
                atualizarEstatisticas();
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Nome</th>
                            <th>Categoria</th>
                            <th>Quantidade</th>
                            <th>Preço Unit.</th>
                            <th>Valor Total</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            produtos.forEach(p => {
                const valorTotal = (p.quantidade * p.preco).toLocaleString('pt-BR', {
                    style: 'currency',
                    currency: 'BRL'
                });

                const precoFormatado = p.preco.toLocaleString('pt-BR', {
                    style: 'currency',
                    currency: 'BRL'
                });

                let statusClass = 'status-normal';
                let statusTexto = '✅ Normal';

                if (p.quantidade < p.estoqueMinimo) {
                    statusClass = 'status-baixo';
                    statusTexto = '🔴 Crítico';
                } else if (p.quantidade <= p.estoqueMinimo + 10) {
                    statusClass = 'status-medio';
                    statusTexto = '🟡 Alerta';
                }

                html += `
                    <tr>
                        <td><strong>${p.codigo}</strong></td>
                        <td>${p.nome}</td>
                        <td>${p.categoria}</td>
                        <td>${p.quantidade}</td>
                        <td>${precoFormatado}</td>
                        <td>${valorTotal}</td>
                        <td><span class="${statusClass}">${statusTexto}</span></td>
                        <td>
                            <button class="btn-edit" onclick="abrirEdicao(${p.id})">✏️ Editar</button>
                            <button class="btn-delete" onclick="deletarProduto(${p.id})">🗑️ Deletar</button>
                        </td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
            `;

            container.innerHTML = html;
            atualizarEstatisticas();
        }

        // Abrir Modal de Edição
        function abrirEdicao(id) {
            const produto = produtos.find(p => p.id === id);
            if (!produto) return;

            produtoEmEdicao = id;
            document.getElementById('editNome').value = produto.nome;
            document.getElementById('editQuantidade').value = produto.quantidade;
            document.getElementById('editPreco').value = produto.preco;
            document.getElementById('editMinimo').value = produto.estoqueMinimo;

            document.getElementById('modalEdicao').classList.add('active');
        }

        // Salvar Edição
        function salvarEdicao() {
            const produto = produtos.find(p => p.id === produtoEmEdicao);
            if (!produto) return;

            const novoNome = document.getElementById('editNome').value.trim();
            const novaQuantidade = parseInt(document.getElementById('editQuantidade').value) || 0;
            const novoPreco = parseFloat(document.getElementById('editPreco').value) || 0;
            const novoMinimo = parseInt(document.getElementById('editMinimo').value) || 0;

            if (!novoNome || novaQuantidade < 0 || novoPreco < 0) {
                alert('⚠️ Preencha todos os campos corretamente!');
                return;
            }

            produto.nome = novoNome;
            produto.quantidade = novaQuantidade;
            produto.preco = novoPreco;
            produto.estoqueMinimo = novoMinimo;

            salvarDados();
            fecharModal();
            atualizarTabela();
            alert('✅ Produto atualizado com sucesso!');
        }

        // Fechar Modal
        function fecharModal() {
            document.getElementById('modalEdicao').classList.remove('active');
            produtoEmEdicao = null;
        }

        // Deletar Produto
        function deletarProduto(id) {
            if (confirm('Tem certeza que deseja deletar este produto?')) {
                produtos = produtos.filter(p => p.id !== id);
                salvarDados();
                atualizarTabela();
                alert('✅ Produto deletado com sucesso!');
            }
        }

        // Atualizar Estatísticas
        function atualizarEstatisticas() {
            const totalProdutos = produtos.length;
            const quantidadeTotal = produtos.reduce((sum, p) => sum + p.quantidade, 0);
            const valorTotal = produtos.reduce((sum, p) => sum + (p.quantidade * p.preco), 0);
            const produtosAlerta = produtos.filter(p => p.quantidade < p.estoqueMinimo).length;

            document.getElementById('totalProdutos').textContent = totalProdutos;
            document.getElementById('quantidadeTotal').textContent = quantidadeTotal;
            document.getElementById('valorTotal').textContent = valorTotal.toLocaleString('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            });
            document.getElementById('produtosAlerta').textContent = produtosAlerta;
        }

        // Salvar Dados no LocalStorage
        function salvarDados() {
            localStorage.setItem('estoque', JSON.stringify(produtos));
        }

        // Carregar dados ao abrir a página
        atualizarTabela();
    </script>
</body>
</html>
